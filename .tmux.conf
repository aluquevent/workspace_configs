set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Basics
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g renumber-windows on
set -g escape-time 0

# Status bar
# Catppuccin Mocha colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Inactive windows
set -g window-status-style "bg=#313244,fg=#cdd6f4"
set -g window-status-format " #I:#W "

# Active window — pops with a highlight color
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g window-status-current-format " #I:#W "

# Padding is just spaces around the format string, as above
set -g status-position bottom
set -g status-left-length 80
set -g status-right-length 50
set -g window-status-separator ""
set -g status on
set -g status-left "#[bold]#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}} | #{?#{!=:#{@exit_code},0},#[fg=red]#{@exit_code} ,}#[fg=green]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo '') "
set -g status-right "#S | %H:%M "

bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Move window to another session (interactive menu)
bind M choose-tree -s "move-window -t '%%'"
# Swap window position left/right
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Yank settings — keep selection highlighted after copy
set -g @yank_action 'copy-pipe'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

